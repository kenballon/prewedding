<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sunny and windy pre-wedding moodboard references.">
    <title>Moodboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="main.css">
    <script src="./app.js" defer></script>
</head>

<body>
    <main class="container">
        <header class="hero-title">
            <p class="eyebrow">Sunny outdoor concept</p>
            <h1>Moodboard</h1>
            <p class="hero-copy">
                <strong>Persona:</strong> Strolling through sunny and windy weather, enjoying the scenery, and maybe reading.
            </p>
        </header>

        <section class="gallery-section" aria-labelledby="gallery-title">
            <div class="section-heading">
                <h2 id="gallery-title">Visual References</h2>
                <p>Tap a frame to preview it larger.</p>
            </div>

            <div class="card-grid-wrapper" aria-live="polite">
                <p class="gallery-status">Loading references...</p>
            </div>
        </section>
    </main>

    <dialog class="image-dialog" aria-label="Image preview">
        <button class="dialog-close" type="button" aria-label="Close preview">&times;</button>
        <button class="dialog-nav previous" type="button" aria-label="Previous image">&lsaquo;</button>
        <img class="dialog-image" src="" alt="">
        <button class="dialog-nav next" type="button" aria-label="Next image">&rsaquo;</button>
    </dialog>
</body>

</html>
